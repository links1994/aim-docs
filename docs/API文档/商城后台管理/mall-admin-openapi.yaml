openapi: 3.0.3
info:
  title: 售后管理 API（mall-admin BFF）
  description: |
    管理后台售后管理接口，供运营人员调用。
    - 售后列表查询（分页）
    - 售后详情查询
    - 修改运营备注
    - 售后状态/类型枚举查询
  version: 1.1.0
servers:
  - url: /mall-admin
    description: 网关地址（前端调用地址）
tags:
  - name: 售后管理（管理后台）
    description: 售后管理（管理后台视角）
paths:
  /api/admin/aftersale/page-list:
    post:
      tags:
        - 售后管理（管理后台）
      summary: 售后列表查询（管理后台）
      description: 管理后台分页查询售后单列表，支持多维度筛选
      operationId: pageListAftersaleForAdmin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AftersaleAdminPageApiRequest'
            example:
              statusList: [10, 20]
              aftersaleTypeList: ["RETURN_AND_REFUND"]
              merchantId: 2001
              aftersaleNo: "AS2026"
              applyStartTime: "2026-05-01 00:00:00"
              applyEndTime: "2026-05-31 23:59:59"
              slaTimeoutHours: 4
              minRefundAmount: 10.00
              maxRefundAmount: 1000.00
              pageNum: 1
              pageSize: 20
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageDataAdminListItem'
  /api/admin/aftersale/{aftersaleNo}/detail:
    get:
      tags:
        - 售后管理（管理后台）
      summary: 售后详情查询（管理后台）
      description: 管理后台查询售后单详情，包含用户信息、商品信息、商家信息、物流信息、售后记录等
      operationId: getAftersaleAdminDetail
      parameters:
        - name: aftersaleNo
          in: path
          required: true
          description: 售后单号
          example: "AS20260518000001"
          schema:
            type: string
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AftersaleAdminDetailResponse'
  /api/admin/aftersale/update-note:
    post:
      tags:
        - 售后管理（管理后台）
      summary: 修改运营备注
      description: 运营人员对售后单添加或修改运营备注信息
      operationId: updateAdminNote
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAdminNoteApiRequest'
            example:
              aftersaleNo: "AS20260518000001"
              adminNote: "已联系商家确认退款时间"
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommonResultVoid'
  /api/admin/aftersale/enums/status:
    get:
      tags:
        - 售后管理（管理后台）
      summary: 售后状态枚举
      description: 查询售后状态枚举列表（供前端下拉筛选）
      operationId: getAdminStatusEnums
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusOptionList'
  /api/admin/aftersale/enums/type:
    get:
      tags:
        - 售后管理（管理后台）
      summary: 售后类型枚举
      description: 查询售后类型枚举列表（供前端下拉筛选）
      operationId: getAdminTypeEnums
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TypeOptionList'
  /api/admin/arbitration/page-list:
    post:
      tags:
        - 仲裁管理（管理后台）
      summary: 仲裁工单列表查询
      description: 管理后台分页查询仲裁工单列表（仅 status IN 60/70/80 仲裁段）
      operationId: pageListArbitration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ArbitrationPageApiRequest'
            example:
              statusList: [60, 70, 80]
              keyword: "AS2026"
              pageNum: 1
              pageSize: 20
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageDataArbitrationListItem'
  /api/admin/arbitration/{caseNo}/detail:
    get:
      tags:
        - 仲裁管理（管理后台）
      summary: 仲裁工单详情查询
      description: 查询仲裁工单详情，包含双方举证材料、诉求及提交时间
      operationId: getArbitrationDetail
      parameters:
        - name: caseNo
          in: path
          required: true
          description: 仲裁单号
          example: "AR20260518000001"
          schema:
            type: string
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArbitrationDetailResponse'
  /api/admin/arbitration/tab-counts:
    get:
      tags:
        - 仲裁管理（管理后台）
      summary: 仲裁 Tab 计数查询
      description: 查询各仲裁 Tab 的待处理数量，用于显示 Tab 徽标
      operationId: getArbitrationTabCounts
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArbitrationTabCountsResponse'
  /api/admin/arbitration/arbitrate:
    post:
      tags:
        - 仲裁管理（管理后台）
      summary: 平台仲裁判定
      description: 平台对仲裁工单进行最终判定
      operationId: arbitrate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ArbitrateApiRequest'
            example:
              caseNo: "AR20260518000001"
              arbitrationResult: "SUPPORT_REFUND"
              refundAmount: 99.00
              arbitrationOpinion: "经核实，用户举证充分，商家未能提供有效反驳证据，同意全额退款"
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommonResultVoid'
  /api/admin/arbitration/enums/arbitration-result:
    get:
      tags:
        - 仲裁管理（管理后台）
      summary: 仲裁判定结果枚举
      description: 查询仲裁判定结果枚举列表（供前端下拉筛选）
      operationId: getArbitrationResultEnums
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArbitrationResultOptionList'
  schemas:
    AftersaleAdminPageApiRequest:
      type: object
      description: 管理后台售后列表查询请求
      properties:
        statusList:
          type: array
          description: 售后状态列表（多状态筛选；单状态传单元素列表）
          items:
            type: integer
          example: [10, 20]
        aftersaleTypeList:
          type: array
          description: 售后类型列表（多类型筛选；单类型传单元素列表）
          items:
            type: string
          example: ["RETURN_AND_REFUND", "EXCHANGE"]
        aftersaleNo:
          type: string
          description: 售后单号（前缀 LIKE 匹配）
          example: "AS2026"
        subOrderSn:
          type: string
          description: 子订单号（前缀 LIKE 匹配）
          example: "SUB202605"
        productCode:
          type: string
          description: 商品编码（前缀 LIKE 匹配）
          example: "SKU0001"
        merchantId:
          type: integer
          format: int64
          description: 商家ID
          example: 2001
        userId:
          type: integer
          format: int64
          description: 用户ID
          example: 10001
        applyStartTime:
          type: string
          format: date-time
          description: 申请时间-起
          example: "2026-05-01 00:00:00"
        applyEndTime:
          type: string
          format: date-time
          description: 申请时间-止
          example: "2026-05-31 23:59:59"
        slaTimeoutHours:
          type: integer
          description: SLA 临期阈值（小时）。仅 {4, 12, 24} 生效；其它值不抛错，按不过滤处理
          enum: [4, 12, 24]
          example: 4
        minRefundAmount:
          type: number
          format: decimal
          description: 最低申请退款金额
          example: 10.00
        maxRefundAmount:
          type: number
          format: decimal
          description: 最高申请退款金额
          example: 1000.00
        pageNum:
          type: integer
          description: 页码（默认1）
          default: 1
          example: 1
        pageSize:
          type: integer
          description: 每页条数（默认20）
          default: 20
          example: 20
    ArbitrationPageApiRequest:
      type: object
      description: 仲裁列表查询请求
      properties:
        statusList:
          type: array
          description: 仲裁状态列表（限定：60/70/80）
          items:
            type: integer
        keyword:
          type: string
          description: 关键词（售后单号/订单号模糊搜索）
          example: "AS2026"
        merchantId:
          type: integer
          format: int64
          description: 商家ID
          example: 2001
        startTime:
          type: string
          format: date-time
          description: 查询开始时间
          example: "2026-05-01 00:00:00"
        endTime:
          type: string
          format: date-time
          description: 查询结束时间
          example: "2026-05-31 23:59:59"
        pageNum:
          type: integer
          description: 页码（默认1）
          default: 1
          example: 1
        pageSize:
          type: integer
          description: 每页条数（默认20）
          default: 20
          example: 20
        sortField:
          type: string
          description: 排序字段（白名单：createTime/arbitrationApplyTime）
          example: "createTime"
        sortOrder:
          type: string
          description: 排序方向：asc/desc
          example: "desc"
    UpdateAdminNoteApiRequest:
      type: object
      description: 修改运营备注请求
      required:
        - aftersaleNo
      properties:
        aftersaleNo:
          type: string
          description: 售后单号
          example: "AS20260518000001"
        adminNote:
          type: string
          description: 运营备注内容
          example: "已联系商家确认退款时间"
        operatorId:
          type: integer
          format: int64
          description: 操作人ID
          example: 30001
    AftersaleAdminListItem:
      type: object
      description: 管理后台售后列表项
      properties:
        aftersaleNo:
          type: string
          description: 售后单号
          example: "AS20260518000001"
        orderSn:
          type: string
          description: 订单号
          example: "ON20260518000001"
        subOrderSn:
          type: string
          description: 子订单号
          example: "SUB20260518000001"
        userId:
          type: integer
          format: int64
          description: 用户ID
          example: 10001
        merchantName:
          type: string
          description: 商家名称
          example: "XX旗舰店"
        status:
          type: integer
          description: 主状态编码
          example: 10
        statusName:
          type: string
          description: 主状态枚举名
          example: "PENDING_MERCHANT_AUDIT"
        statusText:
          type: string
          description: 主状态中文文案
          example: "待商家审核"
        aftersaleType:
          type: string
          description: 售后类型编码
          example: "RETURN_AND_REFUND"
        aftersaleTypeName:
          type: string
          description: 售后类型枚举名
          example: "RETURN_AND_REFUND"
        aftersaleTypeText:
          type: string
          description: 售后类型中文文案
          example: "退货退款"
        applyRefundAmount:
          type: number
          format: decimal
          description: 申请退款金额
          example: 100.00
        slaDeadline:
          type: string
          format: date-time
          description: SLA截止时间
          example: "2026-05-20 10:00:00"
        createdAt:
          type: string
          format: date-time
          description: 创建时间
          example: "2026-05-18 10:00:00"
    ArbitrationListItem:
      type: object
      description: 仲裁列表项
      properties:
        aftersaleNo:
          type: string
          description: 售后单号
          example: "AS20260518000001"
        orderSn:
          type: string
          description: 订单号
          example: "ON20260518000001"
        userId:
          type: integer
          format: int64
          description: 用户ID
          example: 10001
        merchantId:
          type: integer
          format: int64
          description: 商家ID
          example: 2001
        merchantName:
          type: string
          description: 商家名称
          example: "XX旗舰店"
        status:
          type: integer
          description: 主状态编码
          example: 80
        statusName:
          type: string
          description: 主状态枚举名
          example: "PLATFORM_ARBITRATION"
        statusText:
          type: string
          description: 主状态中文文案
          example: "平台介入中"
        aftersaleType:
          type: string
          description: 售后类型编码
          example: "RETURN_AND_REFUND"
        aftersaleTypeName:
          type: string
          description: 售后类型枚举名
          example: "RETURN_AND_REFUND"
        aftersaleTypeText:
          type: string
          description: 售后类型中文文案
          example: "退货退款"
        applyRefundAmount:
          type: number
          format: decimal
          description: 申请退款金额
          example: 100.00
        arbitrationDeadline:
          type: string
          format: date-time
          description: 仲裁截止时间
          example: "2026-05-25 10:00:00"
        arbitrationApplyTime:
          type: string
          format: date-time
          description: 申请仲裁时间
          example: "2026-05-20 10:00:00"
        createdAt:
          type: string
          format: date-time
          description: 创建时间
          example: "2026-05-18 10:00:00"
    ArbitrateApiRequest:
      type: object
      description: 仲裁判定请求
      required:
        - caseNo
        - arbitrationResult
      properties:
        caseNo:
          type: string
          description: 仲裁单号
          example: "AR20260518000001"
        arbitrationResult:
          type: string
          description: 仲裁结果（SUPPORT_REFUND=支持退款/SUPPORT_RETURN=支持退货/REJECT=驳回）
          example: "SUPPORT_REFUND"
        refundAmount:
          type: number
          format: decimal
          description: 判定退款金额
          example: 99.00
        arbitrationOpinion:
          type: string
          description: 仲裁意见
          example: "经核实，用户举证充分，同意全额退款"
        operatorId:
          type: integer
          format: int64
          description: 操作人ID
          example: 30001
    AftersaleAdminDetailResponse:
      type: object
      description: 管理后台售后详情响应
      properties:
        aftersaleNo:
          type: string
          description: 售后单号
        orderSn:
          type: string
          description: 订单号
        subOrderSn:
          type: string
          description: 子订单号
        status:
          type: integer
          description: 主状态编码
        statusName:
          type: string
          description: 主状态枚举名
        statusText:
          type: string
          description: 主状态中文文案
        aftersaleType:
          type: string
          description: 售后类型
        aftersaleTypeText:
          type: string
          description: 售后类型中文
        applyRefundAmount:
          type: number
          format: decimal
          description: 申请退款金额
        actualRefundAmount:
          type: number
          format: decimal
          description: 实际退款金额
        refundReason:
          type: string
          description: 退款原因
        refundDesc:
          type: string
          description: 退款说明
        userInfo:
          $ref: '#/components/schemas/UserInfoModule'
        orderInfo:
          $ref: '#/components/schemas/AftersaleOrderInfoModule'
        merchantInfo:
          $ref: '#/components/schemas/MerchantInfoModule'
        logisticsInfo:
          $ref: '#/components/schemas/LogisticsInfoModule'
        returnAddress:
          $ref: '#/components/schemas/ReturnAddressModule'
        aftersaleEvents:
          type: array
          description: 售后记录列表
          items:
            $ref: '#/components/schemas/AftersaleEventRecord'
        adminNote:
          type: string
          description: 运营备注
        merchantNote:
          type: string
          description: 商家备注
        createdAt:
          type: string
          format: date-time
          description: 创建时间
    UserInfoModule:
      type: object
      description: 用户信息模块
      properties:
        userId:
          type: integer
          format: int64
          description: 用户ID
        userName:
          type: string
          description: 用户昵称
        userPhone:
          type: string
          description: 脱敏手机号
          example: "138****5678"
        userLevel:
          type: string
          description: 用户等级
          example: "VIP"
    AftersaleOrderInfoModule:
      type: object
      description: 售后订单商品信息模块
      properties:
        productId:
          type: integer
          format: int64
          description: 商品ID
        productName:
          type: string
          description: 商品名称
        productImage:
          type: string
          description: 商品图片URL
        skuId:
          type: integer
          format: int64
          description: SKU ID
        skuDesc:
          type: string
          description: SKU规格
        quantity:
          type: integer
          description: 数量
        productPrice:
          type: number
          format: decimal
          description: 商品单价
    MerchantInfoModule:
      type: object
      description: 商家信息模块
      properties:
        merchantId:
          type: integer
          format: int64
          description: 商家ID
        merchantName:
          type: string
          description: 商家名称
    LogisticsInfoModule:
      type: object
      description: 物流信息模块
      properties:
        logisticsNo:
          type: string
          description: 物流单号
        logisticsCompany:
          type: string
          description: 物流公司
        logisticsStatus:
          type: string
          description: 物流状态
    ReturnAddressModule:
      type: object
      description: 退货地址模块
      properties:
        receiverName:
          type: string
          description: 收货人姓名
        receiverPhone:
          type: string
          description: 收货人电话
        receiverAddress:
          type: string
          description: 收货地址
    AftersaleEventRecord:
      type: object
      description: 售后事件记录
      properties:
        eventType:
          type: string
          description: 事件类型
        eventText:
          type: string
          description: 事件类型文案
        operatorType:
          type: integer
          description: 操作人类型（1=用户 2=商家 3=平台 4=系统）
        operatorName:
          type: string
          description: 操作人名称
        eventDesc:
          type: string
          description: 事件描述
        attachments:
          type: array
          description: 附件列表
          items:
            $ref: '#/components/schemas/AttachmentInfo'
        occurredAt:
          type: string
          format: date-time
          description: 发生时间
    AttachmentInfo:
      type: object
      description: 附件信息
      properties:
        url:
          type: string
          description: 附件URL
        type:
          type: string
          description: 附件类型（IMAGE/VIDEO/FILE）
    ArbitrationDetailResponse:
      type: object
      description: 仲裁工单详情响应
      properties:
        caseNo:
          type: string
          description: 仲裁单号
        aftersaleNo:
          type: string
          description: 售后单号
        status:
          type: string
          description: 状态（PENDING_EVIDENCE/PENDING_ARBITRATION/COMPLETED）
        userEvidence:
          $ref: '#/components/schemas/EvidenceInfo'
        merchantEvidence:
          $ref: '#/components/schemas/EvidenceInfo'
        result:
          $ref: '#/components/schemas/ArbitrationResultInfo'
    EvidenceInfo:
      type: object
      description: 举证信息
      properties:
        hasSubmitted:
          type: boolean
          description: 是否已提交
        evidenceText:
          type: string
          description: 举证说明
        attachments:
          type: array
          description: 附件列表
          items:
            $ref: '#/components/schemas/AttachmentInfo'
        submittedAt:
          type: string
          format: date-time
          description: 提交时间
        userDemand:
          type: string
          description: 用户诉求
    ArbitrationResultInfo:
      type: object
      description: 仲裁结果信息
      properties:
        arbitrationResult:
          type: string
          description: 仲裁结果（SUPPORT_REFUND/SUPPORT_RETURN/REJECT）
        arbitrationOpinion:
          type: string
          description: 仲裁意见
        refundAmount:
          type: number
          format: decimal
          description: 判定退款金额
        operatorId:
          type: integer
          format: int64
          description: 操作人ID
        operatorName:
          type: string
          description: 操作人名称
    ArbitrationTabCountsResponse:
      type: object
      description: 仲裁Tab计数响应
      properties:
        pendingEvidence:
          type: integer
          description: 待举证数量
        pendingArbitration:
          type: integer
          description: 待判定数量
        completed:
          type: integer
          description: 已判定数量
    AftersaleStatusOptionDTO:
      type: object
      description: 售后状态枚举选项
      properties:
        code:
          type: integer
          description: 状态编码
          example: 10
        text:
          type: string
          description: 状态文案
          example: "待商家审核"
    AftersaleTypeOptionDTO:
      type: object
      description: 售后类型枚举选项
      properties:
        code:
          type: string
          description: 类型编码
          example: "RETURN_AND_REFUND"
        text:
          type: string
          description: 类型文案
          example: "退货退款"
    StatusOptionList:
      type: object
      description: 状态枚举列表响应
      properties:
        code:
          type: integer
          description: 状态码
          example: 200
        message:
          type: string
          description: 消息
          example: "success"
        data:
          type: array
          items:
            $ref: '#/components/schemas/AftersaleStatusOptionDTO'
    TypeOptionList:
      type: object
      description: 类型枚举列表响应
      properties:
